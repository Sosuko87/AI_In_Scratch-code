name: Run AI Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # 5時間ごとに起動（世界標準時 UTC のため、時間は多少ズレることがあります）
    - cron: '0 */5 * * *'

# 同じワークフローが重なった場合、古い方を即座に自動キャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-python:
    runs-on: ubuntu-latest
    # GitHubの最大連続実行は6時間ですが、5時間（300分）の手前で安全に落とします
    timeout-minutes: 295

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # キャッシュを有効化し、毎回ダウンロードする時間を短縮
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach requests

      - name: Run ai.py
        env:
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        # 無限ループ中にタイムアウトになっても、最後に正常ログが残るように調整
        run: |
          echo "=== 5時間の自動ループを開始します ==="
          while true; do
            echo "=== AIスクリプトを起動します ==="
            python ai.py || echo "=== スクリプトがエラー終了しました ==="
            echo "=== 5秒後に自動再起動します ==="
            sleep 5
          done
