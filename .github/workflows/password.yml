name: Run AI Script

# トリガー（例：コードがプッシュされた時、または手動実行）
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # GitHubの画面から手動で実行できるようにするボタンを追加

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 必要なPythonのバージョン

      # 3. 必要なライブラリのインストール（もし requirements.txt などがあれば）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # もし必要なライブラリがあればここに記述（例: pip install scratchattach など）

      # 4. Secretを環境変数として渡して Python を実行する
      - name: Run ai.py
        env:
          # 左側：ai.pyが os.environ.get() で探す名前
          # 右側：GitHubに保存したSecret
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        run: python ai.py
