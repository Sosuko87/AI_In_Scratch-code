name: Run AI Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  # 5時間ごとに自動で起動するスケジュール設定
  schedule:
    - cron: '0 */5 * * *'

# 【新機能】同じワークフローが重なった場合、古い方を自動的にキャンセル（終了）させる設定
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-python:
    runs-on: ubuntu-latest
    # 【修正】5時間（300分）で確実にタイムアウトさせて、次の起動と重ならないようにします
    timeout-minutes: 298

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach
          pip install requests

      - name: Run ai.py
        env:
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        # Pythonが終了しても、5時間の枠内（300分）であれば即座に再起動します
        run: |
          while true; do
            echo "=== Pythonスクリプトを起動します ==="
            python ai.py
            echo "=== Pythonが予期せず終了しました。5秒後に自動再起動します ==="
            sleep 5
          done
