name: Run AI Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Run AI Script"]
    types:
      - requested

# 新しいのが立ち上がったら、万が一残っている古いジョブを強制終了
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-python:
    runs-on: ubuntu-latest
    # 万が一Pythonがフリーズした時の保険として300分で設定
    timeout-minutes: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach requests

      - name: Run ai.py
        env:
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        # 【変更】Python側が4時間50分で自ら終了するのを静かに待ちます
        run: |
          python ai.py

  trigger-next:
    needs: run-python
    runs-on: ubuntu-latest
    if: always() # Pythonが正常終了してもエラーになっても必ず実行
    steps:
      - name: Trigger next workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 次の新しいワークフローを召喚します ==="
          gh workflow run "Run AI Script" --ref main
