name: Run AI Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  # 5時間ごとに自動で起動するスケジュール設定
  schedule:
    - cron: '46 */5 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-python:
    runs-on: ubuntu-latest
    # 保険のためのタイムアウト（正常に終わらなかった場合の強制終了枠）
    timeout-minutes: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach
          pip install requests

      - name: Run ai.py
        env:
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        # 【修正】Linuxのtimeoutコマンドを使い、17880秒（4時間58分）でループを安全に終了させます
        run: |
          START_TIME=$(date +%s)
          LIMIT_SECONDS=17880 # 4時間58分 (298分 × 60秒)

          echo "=== 4時間58分の監視ループを開始します ==="
          
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            REMAINING=$((LIMIT_SECONDS - ELAPSED))

            # 残り時間が0秒以下、または5秒（待機時間）未満ならループを抜けて終了する
            if [ $REMAINING -le 5 ]; then
              echo "=== 4時間58分が経過したため、次の起動へ向けて正常終了します ==="
              break
            fi

            echo "=== Pythonスクリプトを起動します (制限時間: 残り $REMAINING 秒) ==="
            
            # timeout コマンドで、この周回のPython実行が残り時間を超えないように制御
            timeout $REMAINING python ai.py
            EXIT_CODE=$?

            # timeoutによって終了させられた場合（124番）はループを抜ける
            if [ $EXIT_CODE -eq 124 ]; then
              echo "=== Python実行中に4時間58分に達したため終了します ==="
              break
            fi

            echo "=== Pythonが終了しました（コード: $EXIT_CODE）。5秒後に再起動します ==="
            sleep 5
          done
