name: Run AI Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # ← 手動で起動できるようにこれだけ残します

# 新しいのが立ち上がったら、万が一残っている古いジョブを強制終了
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# トークンに新しいワークフローを起動（書き込み）する権限を与える設定
permissions:
  actions: write
  contents: read

jobs:
  run-python:
    runs-on: ubuntu-latest
    # 万が一Pythonが完全にフリーズした時の保険として300分で設定
    timeout-minutes: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach requests

      - name: Run ai.py
        env:
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        # もしPythonがネットワークエラー等で途中で落ちても、4時間50分経つまでは何度でも自動復活させます
        run: |
          while true; do
            echo "=== AIスクリプトを起動します ==="
            python ai.py && break || echo "=== 途中でエラー終了しました。5秒後に再起動します ==="
            sleep 5
          done

  trigger-next:
    needs: run-python
    runs-on: ubuntu-latest
    if: always() # Pythonが4時間50分で正常終了しても、エラーになっても必ず実行
    steps:
      - name: Trigger next workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 4時間50分経ったので、次の新しいワークフローを召喚します ==="
          gh workflow run "Run AI Script" --ref main
