name: Scratchattach 24/7 Live Bot

on:
  schedule:
    # 5時間ごとに自動で起動して、前の処理とバトンタッチします
    - cron: '0 */5 * * *'
  workflow_dispatch: # 手動起動用ボタン

# 同時に複数が動かないように制御
concurrency:
  group: scratch-bot-live-group
  cancel-in-progress: true 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach requests python-dotenv

      # 日本時間の「06:30〜21:00」の間だけ実行するように制限（夜間は動かさない）
      - name: Run script with time restriction
        # 🔑 ここが最重要！隠し金庫（Secrets）からPythonコードへアカウント情報を引き渡します
        env:
          SCRATCH_USERNAME: ${{ secrets.SCRATCH_USERNAME }}
          SCRATCH_PASSWORD: ${{ secrets.SCRATCH_PASSWORD }}
        run: |
          JST_HOUR=$(date -d "+9 hours" +"%H")
          JST_MIN=$(date -d "+9 hours" +"%M")
          echo "Current JST is $JST_HOUR:$JST_MIN"
          
          if [ "$JST_HOUR" -lt 6 ] || { [ "$JST_HOUR" -eq 6 ] && [ "$JST_MIN" -lt 30 ]; } || [ "$JST_HOUR" -ge 21 ]; then
            echo "Outside operating hours (6:30 - 21:00). Skipping execution."
            exit 0
          fi

          # 現在テストに使っている「main.py」を実行する設定にします
          python main.py
