name: Scratchattach AI

on:
  schedule:
    # 毎日 日本時間 06:30（UTC 21:30）に自動起動
    - cron: '30 21 * * *'
  workflow_dispatch: # これがあると画面から手動でいつでも起動できます

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. コードをサーバーにコピー
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Pythonの準備
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. scratchattachのインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scratchattach

      # 4. プログラムの実行
      - name: Run script
        run: python ai.py  # ※実際のPythonのファイル名が「main.py」でない場合はここを書き換えてください
